name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run pyright
      - run: uv run pytest

  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group codegen
      - run: sh bin/codegen.sh
      - name: Fail if generated files are out of sync with the spec
        run: git diff --exit-code src/obitrain/api/models.py src/obitrain/api/openapi.json
