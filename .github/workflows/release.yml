name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: master
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          VERSION="${HEAD_REF#release/}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$HEAD_REF" ]; then
            echo "error: could not extract version from $HEAD_REF" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Save PR body as release notes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s\n' "$PR_BODY" > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "error: PR body is empty — refusing to release" >&2
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build package
        run: uv build

      - name: Tag release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -F RELEASE_NOTES.md
          git push origin "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: dist/*

      - name: Publish to PyPI
        run: uv publish
