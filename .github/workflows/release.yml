name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: master
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          VERSION="${HEAD_REF#release/}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$HEAD_REF" ]; then
            echo "error: could not extract version from $HEAD_REF" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Save PR body as release notes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s\n' "$PR_BODY" > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "error: PR body is empty — refusing to release" >&2
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Build package
        run: uv build

      - name: Tag release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -F RELEASE_NOTES.md
          git push origin "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: dist/*

      - name: Publish to PyPI
        run: uv publish
